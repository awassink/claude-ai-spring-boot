name: Release Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SONAR_PROJECT_KEY: awassink_claude-ai-spring-boot
  SONAR_ORGANIZATION: awassink
  SONAR_HOST_URL: https://sonarcloud.io

jobs:
  build-and-release:
    name: Build, Test & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Cache Testcontainers images
        id: tc-cache
        uses: actions/cache@v4
        with:
          path: /tmp/tc-images
          key: tc-images-postgres-16-alpine-ryuk-0.12.0

      - name: Load cached Testcontainers images
        if: steps.tc-cache.outputs.cache-hit == 'true'
        run: |
          docker load < /tmp/tc-images/postgres-16-alpine.tar
          docker load < /tmp/tc-images/ryuk-0.12.0.tar

      - name: Build and run tests
        run: mvn --batch-mode verify

      - name: Save Testcontainers images to cache
        if: steps.tc-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/tc-images
          docker save postgres:16-alpine > /tmp/tc-images/postgres-16-alpine.tar
          docker save testcontainers/ryuk:0.12.0 > /tmp/tc-images/ryuk-0.12.0.tar

      - name: OWASP Dependency-Check
        run: |
          mvn --batch-mode org.owasp:dependency-check-maven:12.1.3:check \
            -DnvdDatafeedUrl=https://dependency-check.github.io/DependencyCheck_Builder/nvd_cache/ \
            -DfailBuildOnCVSS=9 \
            -DskipTestScope=true

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 7

      - name: SonarQube analysis
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: target/sonar/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Upload test reports
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v-${{ github.run_number }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
